name: aps-19023-smoke

# APS-19023: post-merge smoke against upstream master.
# PR #84 merged to browserstack/github-actions:master 2026-05-05.
# This consumes setup-env + setup-local + browserstack-report-action @ master
# (canonical customer reference) to verify the deprecation warning is gone for
# real-world usage on all three migrated actions.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: BrowserStack Env Setup
        uses: browserstack/github-actions/setup-env@master
        with:
          username:   ${{ secrets.BROWSERSTACK_USERNAME }}
          access-key: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          build-name: aps-19023-smoke-${{ github.run_id }}-${{ matrix.os }}
          project-name: aps-19023

      - name: BrowserStackLocal Start
        uses: browserstack/github-actions/setup-local@master
        with:
          local-testing: start
          local-identifier: aps-19023-${{ github.run_id }}-${{ matrix.os }}
          local-logging-level: all-logs

      - name: Verify env vars are set
        shell: bash
        run: |
          echo "USERNAME set:          ${BROWSERSTACK_USERNAME:+yes}"
          echo "ACCESS_KEY set:        ${BROWSERSTACK_ACCESS_KEY:+yes}"
          echo "BUILD_NAME=$BROWSERSTACK_BUILD_NAME"
          echo "PROJECT_NAME=$BROWSERSTACK_PROJECT_NAME"
          echo "LOCAL_IDENTIFIER=$BROWSERSTACK_LOCAL_IDENTIFIER"
          test -n "$BROWSERSTACK_USERNAME"          || (echo "missing BROWSERSTACK_USERNAME"          && exit 1)
          test -n "$BROWSERSTACK_ACCESS_KEY"        || (echo "missing BROWSERSTACK_ACCESS_KEY"        && exit 1)
          test -n "$BROWSERSTACK_BUILD_NAME"        || (echo "missing BROWSERSTACK_BUILD_NAME"        && exit 1)
          test -n "$BROWSERSTACK_PROJECT_NAME"      || (echo "missing BROWSERSTACK_PROJECT_NAME"      && exit 1)
          test -n "$BROWSERSTACK_LOCAL_IDENTIFIER"  || (echo "missing BROWSERSTACK_LOCAL_IDENTIFIER"  && exit 1)

      - name: BrowserStackLocal Stop
        if: always()
        uses: browserstack/github-actions/setup-local@master
        with:
          local-testing: stop

      # The smoke doesn't run actual tests, so there's no real BS build for
      # report-action to fetch. We expect this step to fail with "build not
      # found"; what we care about is that the action LAUNCHES on Node 24
      # (no module-load error) and that the runner doesn't list it in the
      # Node 20 deprecation warning. continue-on-error keeps the job green.
      - name: BrowserStack Report Action
        if: always()
        continue-on-error: true
        uses: browserstack/github-actions/browserstack-report-action@master
        with:
          username:       ${{ secrets.BROWSERSTACK_USERNAME }}
          access-key:     ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          build-name:     update_network 500 on iOS 26
          report-timeout: '30'
